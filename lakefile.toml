name = "DirichletProblem"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["DirichletProblem"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3


[[require]]
name = "verso"
scope = "leanprover"
rev = "v4.29.0"

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.29.0"

[[lean_lib]]
name = "DirichletProblem"

[[lean_exe]]
name = "generate-docs"
root = "Manual"
